version: "3.8"
services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hireflow
    ports:
      - "5433:5432"
    volumes:
      - postgres18_data:/var/lib/postgresql

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres18_data: